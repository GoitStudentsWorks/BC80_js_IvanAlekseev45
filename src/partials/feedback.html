<section class="feedback-section" id="feedback-section">
  <div class="container">
    <h2 class="feedback-main-title">Відгуки клієнтів</h2>
    <p class="feedback-subtitle">
      Найкращі десерти, які я коли-небудь куштував!
    </p>

    <div class="feedback-slider-container">
      <button
        type="button"
        class="button-prev slider-arrow"
        aria-label="Попередній відгук"
      >
        <svg width="24" height="24" aria-hidden="true">
          <use href="./img/sprite.svg#icon-arrow_back"></use>
        </svg>
      </button>

      <div class="swiper feedback-swiper">
        <ul class="swiper-wrapper" id="feedback-list">
          <p style="text-align: center; width: 100%">
            Завантаження відгуків...
          </p>
        </ul>

        <div class="swiper-pagination"></div>
      </div>

      <button
        type="button"
        class="button-next slider-arrow"
        aria-label="Наступний відгук"
      >
        <svg width="24" height="24" aria-hidden="true">
          <use href="./img/sprite.svg#icon-arrow_forward"></use>
        </svg>
      </button>
    </div>
  </div>
</section>
