<section class="hero-section">
  <picture class="hero-picture">
    <source
      media="(min-width: 1440px)"
      type="image/avif"
      srcset="
        ./img/hero/AVIF/hero-desk.avif    1x,
        ./img/hero/AVIF/hero-desk-2x.avif 2x
      "
    />

    <source
      media="(min-width: 1440px)"
      type="image/webp"
      srcset="
        ./img/hero/WEBP/hero-desk.webp    1x,
        ./img/hero/WEBP/hero-desk-2x.webp 2x
      "
    />

    <source
      media="(min-width: 1440px)"
      type="image/jpeg"
      srcset="
        ./img/hero/jpeg/hero-desk.jpg    1x,
        ./img/hero/jpeg/hero-desk-2x.jpg 2x
      "
    />

    <source
      media="(min-width: 768px)"
      type="image/avif"
      srcset="
        ./img/hero/AVIF/hero-tablet.avif    1x,
        ./img/hero/AVIF/hero-tablet-2x.avif 2x
      "
    />

    <source
      media="(min-width: 768px)"
      type="image/webp"
      srcset="
        ./img/hero/WEBP/hero-tablet.webp    1x,
        ./img/hero/WEBP/hero-tablet-2x.webp 2x
      "
    />

    <source
      media="(min-width: 768px)"
      type="image/jpeg"
      srcset="
        ./img/hero/jpeg/hero-tablet.jpg    1x,
        ./img/hero/jpeg/hero-tablet-2x.jpg 2x
      "
    />

    <source
      type="image/avif"
      srcset="
        ./img/hero/AVIF/hero-mob.avif    1x,
        ./img/hero/AVIF/hero-mob-2x.avif 2x
      "
    />

    <source
      type="image/webp"
      srcset="
        ./img/hero/WEBP/hero-mob.webp    1x,
        ./img/hero/WEBP/hero-mob-2x.webp 2x
      "
    />

    <img
      class="hero-img"
      src="./img/hero/jpeg/hero-mob.jpg"
      srcset="
        ./img/hero/jpeg/hero-mob.jpg    1x,
        ./img/hero/jpeg/hero-mob-2x.jpg 2x
      "
      alt="Ласкаво просимо до Солодкої Майстерні"
      loading="eager"
      fetchpriority="high"
    />
  </picture>

  <div class="container hero-container">
    <h1 class="main-title">Ласкаво просимо до Солодкої Майстерні</h1>
    <p class="main-description">
      Відкрийте для себе наші неперевершені десерти, приготовані з любов'ю та
      увагою до деталей. Кожен шматочок — це справжнє свято смаку!
    </p>
    <a href="#feedbacks" class="main-title-link">Що про нас думають</a>
  </div>
</section>
