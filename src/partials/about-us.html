<section class="about-us section" id="about-us">
  <div class="container">
    <div class="about-us__content">
      <!-- Заголовок секції. Тихо, чисто, по макету. -->
      <h2 class="about-us__title">Про Нашу Майстерню</h2>

      <!-- Короткий опис. -->
      <p class="about-us__text">
        У нашій 'Солодкій Майстерні' ми створюємо неповторні солодкі шедеври, що
        приносять радість та задоволення. Наша місія — пропонувати високоякісні
        десерти, які поєднують у собі вишуканий смак, свіжі інгредієнти та
        естетичний вигляд.
      </p>

      <!-- Галерея: на мобілці статична, на tablet/desktop оживає через Swiper. -->
      <div class="about-us__slider">
        <div class="about-us__viewport swiper">
          <ul class="about-us__list swiper-wrapper">
            <li class="about-us__item swiper-slide">
              <picture>
                <source
                  media="(min-width: 1440px)"
                  srcset="
                    ./img/about-us/about-us-1-desk.jpg    1x,
                    ./img/about-us/about-us-1-desk-2x.jpg 2x
                  "
                />
                <source
                  media="(min-width: 768px)"
                  srcset="
                    ./img/about-us/about-us-1-tablet.jpg    1x,
                    ./img/about-us/about-us-1-tablet-2x.jpg 2x
                  "
                />
                <source
                  media="(max-width: 767px)"
                  srcset="
                    ./img/about-us/about-us-1-mob.jpg    1x,
                    ./img/about-us/about-us-1-mob-2x.jpg 2x
                  "
                />
                <img
                  class="about-us__image"
                  src="./img/about-us/about-us-1-mob.jpg"
                  alt="Приготування десерту"
                />
              </picture>
            </li>

            <li class="about-us__item swiper-slide">
              <picture>
                <source
                  media="(min-width: 1440px)"
                  srcset="
                    ./img/about-us/about-us-2-desk.jpg    1x,
                    ./img/about-us/about-us-2-desk-2x.jpg 2x
                  "
                />
                <source
                  media="(min-width: 768px)"
                  srcset="
                    ./img/about-us/about-us-2-tablet.jpg    1x,
                    ./img/about-us/about-us-2-tablet-2x.jpg 2x
                  "
                />
                <source
                  media="(max-width: 767px)"
                  srcset="./img/about-us/about-us-2-mob-2x.jpg 2x"
                />
                <img
                  class="about-us__image"
                  src="./img/about-us/about-us-2-tablet.jpg"
                  alt="Команда Солодкої Майстерні"
                />
              </picture>
            </li>

            <li class="about-us__item swiper-slide">
              <picture>
                <source
                  media="(min-width: 1440px)"
                  srcset="
                    ./img/about-us/about-us-3-desk.jpg    1x,
                    ./img/about-us/about-us-3-desk-2x.jpg 2x
                  "
                />
                <source
                  media="(min-width: 768px)"
                  srcset="./img/about-us/about-us-3-tablet.jpg 1x"
                />
                <source
                  media="(max-width: 767px)"
                  srcset="
                    ./img/about-us/about-us-3-mob.jpg    1x,
                    ./img/about-us/about-us-3-mob-2x.jpg 2x
                  "
                />
                <img
                  class="about-us__image"
                  src="./img/about-us/about-us-3-mob.jpg"
                  alt="Вітрина з десертами"
                />
              </picture>
            </li>

            <li class="about-us__item swiper-slide">
              <picture>
                <source
                  media="(min-width: 1440px)"
                  srcset="
                    ./img/about-us/about-us-4-desk.jpg    1x,
                    ./img/about-us/about-us-4-desk-2x.jpg 2x
                  "
                />
                <source
                  media="(min-width: 768px)"
                  srcset="
                    ./img/about-us/about-us-4-tablet.jpg    1x,
                    ./img/about-us/about-us-4-tablet-2x.jpg 2x
                  "
                />
                <source
                  media="(max-width: 767px)"
                  srcset="
                    ./img/about-us/about-us-4-mob.jpg    1x,
                    ./img/about-us/about-us-4-mob-2x.jpg 2x
                  "
                />
                <img
                  class="about-us__image"
                  src="./img/about-us/about-us-4-mob.jpg"
                  alt="Дівчина з десертом"
                />
              </picture>
            </li>
          </ul>
        </div>

        <!-- Slider navigation -->
        <button
          class="about-us__button about-us__button--prev"
          type="button"
          aria-label="Попередній слайд"
          tabindex="0"
        >
          <svg
            class="about-us__button-icon"
            width="24"
            height="24"
            aria-hidden="true"
          >
            <use href="./img/sprite.svg#icon-arrow_back"></use>
          </svg>
        </button>

        <button
          class="about-us__button about-us__button--next"
          type="button"
          aria-label="Наступний слайд"
          tabindex="0"
        >
          <svg
            class="about-us__button-icon"
            width="24"
            height="24"
            aria-hidden="true"
          >
            <use href="./img/sprite.svg#icon-arrow_forward"></use>
          </svg>
        </button>
      </div>
    </div>
    <!-- Custom slider pagination -->
    <div>
      <nav class="about-us__pagination" aria-label="Slider pagination"></nav>
    </div>
  </div>
</section>
